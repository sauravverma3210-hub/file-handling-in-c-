<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bootstrap Webpage</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .hero {
            height: 90vh;
            background: linear-gradient(to right, #0d6efd, #6610f2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.05);
            transition: 0.3s;
        }

        footer {
            background: #212529;
            color: white;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">MyWebsite</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div>
            <h1 class="display-4 fw-bold">Welcome to My Website</h1>
            <p class="lead">A simple webpage using HTML, CSS and Bootstrap</p>

            <button class="btn btn-light btn-lg mt-3">
                Get Started
            </button>
        </div>
    </section>

    <!-- Cards Section -->
    <section class="container my-5">
        <div class="row g-4">

            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title">HTML</h3>
                        <p class="card-text">
                            Structure of the webpage.
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title">CSS</h3>
                        <p class="card-text">
                            Styling and design of webpage.
                        </p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <h3 class="card-title">Bootstrap</h3>
                        <p class="card-text">
                            Responsive and modern components.
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyWebsite | All Rights Reserved</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
